<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="25%" cy="15%" r="90%">
      <stop offset="0%" stop-color="#1a2f96"/>
      <stop offset="100%" stop-color="#060d40"/>
    </radialGradient>

    <!-- Logo glitch clip paths (coordinate space of the embedded logo group) -->
    <clipPath id="og-ca"><rect x="0" y="8"   width="760" height="7"/></clipPath>
    <clipPath id="og-cb"><rect x="0" y="42"  width="760" height="5"/></clipPath>
    <clipPath id="og-cc"><rect x="0" y="72"  width="760" height="8"/></clipPath>
    <clipPath id="og-cd"><rect x="0" y="106" width="760" height="5"/></clipPath>
    <clipPath id="og-ce"><rect x="0" y="138" width="760" height="7"/></clipPath>
    <clipPath id="og-cf"><rect x="0" y="160" width="760" height="6"/></clipPath>
    <clipPath id="og-pa"><rect x="0" y="22"  width="760" height="6"/></clipPath>
    <clipPath id="og-pb"><rect x="0" y="56"  width="760" height="5"/></clipPath>
    <clipPath id="og-pc"><rect x="0" y="88"  width="760" height="7"/></clipPath>
    <clipPath id="og-pd"><rect x="0" y="120" width="760" height="5"/></clipPath>
    <clipPath id="og-pe"><rect x="0" y="150" width="760" height="5"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle dot grid texture -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Decorative diagonal line (top-right) -->
  <line x1="900" y1="0" x2="1200" y2="200" stroke="rgba(255,26,112,0.15)" stroke-width="1"/>
  <line x1="950" y1="0" x2="1200" y2="170" stroke="rgba(0,212,255,0.08)" stroke-width="1"/>

  <!-- ── ETHOS logo glitch (centered, scale 1.0, viewBox 760x180) ── -->
  <g transform="translate(220, 105)">
    <!-- Shadow -->
    <text x="382" y="148"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#0c1d6e" opacity="0.9">ETHOS</text>
    <!-- White base -->
    <text x="380" y="144"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#ffffff">ETHOS</text>
    <!-- Cyan glitch -->
    <text x="386" y="144"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#00d4ff" opacity="0.88"
          clip-path="url(#og-ca)">ETHOS</text>
    <text x="386" y="144"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#00d4ff" opacity="0.88"
          clip-path="url(#og-cc)">ETHOS</text>
    <text x="386" y="144"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#00d4ff" opacity="0.88"
          clip-path="url(#og-ce)">ETHOS</text>
    <!-- Pink glitch -->
    <text x="375" y="144"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#ff1a70" opacity="0.82"
          clip-path="url(#og-pa)">ETHOS</text>
    <text x="375" y="144"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#ff1a70" opacity="0.82"
          clip-path="url(#og-pc)">ETHOS</text>
    <text x="375" y="144"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#ff1a70" opacity="0.82"
          clip-path="url(#og-pe)">ETHOS</text>
    <!-- Thin cyan lines -->
    <text x="388" y="144"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#00d4ff" opacity="0.6"
          clip-path="url(#og-cb)">ETHOS</text>
    <text x="388" y="144"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#00d4ff" opacity="0.6"
          clip-path="url(#og-cf)">ETHOS</text>
    <!-- Thin pink lines -->
    <text x="373" y="144"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#ff1a70" opacity="0.55"
          clip-path="url(#og-pb)">ETHOS</text>
    <text x="373" y="144"
          font-family="'Arial Black', 'Arial Bold', Impact, Arial, sans-serif"
          font-size="136" font-weight="900" letter-spacing="20"
          text-anchor="middle" fill="#ff1a70" opacity="0.55"
          clip-path="url(#og-pd)">ETHOS</text>
  </g>

  <!-- Thin separator line -->
  <line x1="440" y1="318" x2="760" y2="318" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- "Alumni Network" -->
  <text x="600" y="385"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="48" font-weight="400" letter-spacing="10"
        text-anchor="middle" fill="rgba(255,255,255,0.92)">Alumni Network</text>

  <!-- Tagline -->
  <text x="600" y="448"
        font-family="Arial, Helvetica, sans-serif"
        font-size="20" font-weight="400" letter-spacing="2"
        text-anchor="middle" fill="rgba(255,255,255,0.45)">Observatory on Public Ethics · LUISS Guido Carli · Rome</text>

  <!-- Pink accent bar at bottom -->
  <rect x="0" y="612" width="1200" height="18" fill="#ff1a70"/>
  <!-- Cyan accent sliver -->
  <rect x="0" y="609" width="1200" height="3" fill="#00d4ff" opacity="0.5"/>
</svg>
